<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Inventario</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg: #1c2226;
    --panel: #242b30;
    --panel-2: #2b3339;
    --line: #3a4349;
    --paper: #eee9de;
    --ink: #eee9de;
    --ink-dim: #a9b0b4;
    --amber: #d9a441;
    --amber-dim: #8a6a2e;
    --teal: #5b8c85;
    --rust: #b5533c;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace;
    --sans: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    min-height:100vh;
  }
  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:28px 20px 60px;
  }
  /* ---------- HEADER ---------- */
  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    border-bottom:2px solid var(--amber);
    padding-bottom:16px;
    margin-bottom:24px;
    flex-wrap:wrap;
    gap:14px;
  }
  .brand-eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.18em;
    color:var(--amber);
    text-transform:uppercase;
    margin:0 0 4px;
  }
  h1{
    margin:0;
    font-size:28px;
    font-weight:800;
    letter-spacing:-0.01em;
  }
  .stamp{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-dim);
    border:1px solid var(--line);
    padding:8px 12px;
    border-radius:2px;
    text-align:right;
    line-height:1.5;
  }
  .stamp b{ color:var(--amber); font-size:15px; display:block;}

  /* ---------- LAYOUT ---------- */
  .layout{
    display:grid;
    grid-template-columns:250px 1fr;
    gap:20px;
    align-items:start;
  }
  @media (max-width:820px){
    .layout{grid-template-columns:1fr;}
  }

  /* ---------- CATEGORY BINS ---------- */
  .bins{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .bin{
    position:relative;
    background:var(--panel);
    border:1px solid var(--line);
    border-left:4px solid var(--amber-dim);
    padding:10px 14px 10px 16px;
    cursor:pointer;
    transition:.15s ease;
    clip-path:polygon(0 0,100% 0,100% 100%,10px 100%,0 calc(100% - 10px));
  }
  .bin:hover{ border-color:var(--amber); background:var(--panel-2); }
  .bin.active{
    border-left-color:var(--amber);
    background:var(--panel-2);
    box-shadow:inset 3px 0 0 var(--amber);
  }
  .bin .bin-idx{
    font-family:var(--mono);
    font-size:10px;
    color:var(--ink-dim);
    letter-spacing:.1em;
  }
  .bin .bin-name{
    font-weight:700;
    font-size:15px;
    margin-top:2px;
    word-break:break-word;
  }
  .bin .bin-count{
    font-family:var(--mono);
    font-size:11px;
    color:var(--teal);
    margin-top:4px;
  }
  .bin .bin-del{
    position:absolute;
    top:8px; right:10px;
    background:none;
    border:none;
    color:var(--ink-dim);
    cursor:pointer;
    font-size:13px;
    opacity:.5;
  }
  .bin .bin-del:hover{ color:var(--rust); opacity:1; }

  .add-bin-form{
    display:flex;
    gap:6px;
    margin-top:4px;
  }
  .add-bin-form input{ flex:1; min-width:0; }

  /* ---------- FORM CONTROLS ---------- */
  input, select{
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--ink);
    padding:8px 10px;
    border-radius:2px;
    font-family:var(--sans);
    font-size:13px;
    outline:none;
  }
  input:focus, select:focus{ border-color:var(--amber); }
  input[type=number]{ font-family:var(--mono); }

  button{
    font-family:var(--sans);
    font-weight:700;
    font-size:12.5px;
    letter-spacing:.02em;
    border:1px solid var(--amber);
    background:var(--amber);
    color:#20262b;
    padding:8px 14px;
    border-radius:2px;
    cursor:pointer;
    white-space:nowrap;
  }
  button:hover{ background:#e6b85c; }
  button.ghost{
    background:transparent;
    color:var(--amber);
  }
  button.ghost:hover{ background:rgba(217,164,65,.12); }
  button.secondary{
    border-color:var(--teal);
    background:transparent;
    color:var(--teal);
  }
  button.secondary:hover{ background:rgba(91,140,133,.14); }
  button:disabled{
    opacity:.4;
    cursor:not-allowed;
  }

  /* ---------- MAIN PANEL ---------- */
  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    padding:20px;
    min-height:420px;
  }
  .panel-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
    margin-bottom:16px;
    padding-bottom:14px;
    border-bottom:1px dashed var(--line);
  }
  .panel-head h2{
    margin:0;
    font-size:20px;
  }
  .panel-head .sub{
    font-family:var(--mono);
    font-size:11px;
    color:var(--ink-dim);
  }
  .empty{
    text-align:center;
    color:var(--ink-dim);
    padding:80px 20px;
    font-size:14px;
  }
  .empty b{ color:var(--ink); }

  /* item form */
  .item-form{
    display:grid;
    grid-template-columns:110px 1fr 90px 110px auto auto;
    gap:8px;
    margin-bottom:18px;
  }
  @media (max-width:700px){
    .item-form{ grid-template-columns:1fr 1fr; }
  }
  .item-form label{
    display:block;
    font-family:var(--mono);
    font-size:10px;
    color:var(--ink-dim);
    margin-bottom:3px;
    text-transform:uppercase;
    letter-spacing:.05em;
  }

  table{
    width:100%;
    border-collapse:collapse;
    font-size:13.5px;
  }
  thead th{
    text-align:left;
    font-family:var(--mono);
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--ink-dim);
    border-bottom:1px solid var(--line);
    padding:8px 8px;
  }
  tbody td{
    padding:10px 8px;
    border-bottom:1px solid var(--line);
    vertical-align:middle;
  }
  tbody tr:hover{ background:rgba(255,255,255,.02); }
  td.code{ font-family:var(--mono); color:var(--amber); }
  td.num{ font-family:var(--mono); text-align:right; }
  td.actions{ text-align:right; white-space:nowrap; }
  td.actions button{ padding:5px 9px; font-size:11px; margin-left:5px; }

  tfoot td{
    padding:12px 8px 4px;
    font-family:var(--mono);
    font-size:12.5px;
    color:var(--ink-dim);
  }
  tfoot td.total-val{ text-align:right; color:var(--amber); font-weight:700; }

  .toolbar{
    display:flex;
    gap:10px;
    align-items:center;
  }

  .toast{
    position:fixed;
    bottom:22px; right:22px;
    background:var(--panel-2);
    border:1px solid var(--amber);
    color:var(--ink);
    padding:10px 16px;
    font-size:13px;
    border-radius:2px;
    opacity:0;
    transform:translateY(8px);
    transition:.25s ease;
    pointer-events:none;
  }
  .toast.show{ opacity:1; transform:translateY(0); }

  .loading-note{
    font-family:var(--mono);
    font-size:11px;
    color:var(--ink-dim);
    margin-top:6px;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <p class="brand-eyebrow">Bodega &middot; Control de existencias</p>
      <h1>Inventario</h1>
    </div>
    <div class="stamp">
      <b id="stat-total-items">0 artículos</b>
      valor total: <span id="stat-total-value">$0.00</span>
    </div>
  </header>

  <div class="layout">
    <!-- CATEGORIES -->
    <div>
      <div class="bins" id="bins"></div>
      <form class="add-bin-form" id="form-add-bin" style="margin-top:12px;">
        <input type="text" id="input-new-bin" placeholder="Nueva categoría…" maxlength="40" required>
        <button type="submit">+</button>
      </form>
      <p class="loading-note" id="storage-note">Cargando datos…</p>
    </div>

    <!-- MAIN -->
    <div class="panel" id="panel">
      <!-- rendered by JS -->
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  const STORAGE_KEY = "inventario-datos";

  let state = {
    categories: [],   // {id, name}
    items: [],        // {id, categoryId, code, name, qty, price}
    selectedCategoryId: null,
    nextIdx: 1
  };

  let editingItemId = null;

  const $ = (sel) => document.querySelector(sel);
  const binsEl = $("#bins");
  const panelEl = $("#panel");
  const toastEl = $("#toast");
  const storageNote = $("#storage-note");

  function uid(prefix){
    return prefix + "_" + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
  }

  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=> toastEl.classList.remove("show"), 2200);
  }

  function money(n){
    return "$" + Number(n||0).toLocaleString("es", {minimumFractionDigits:2, maximumFractionDigits:2});
  }

  // ---------- PERSISTENCE ----------
  async function loadState(){
    try{
      const res = await window.storage.get(STORAGE_KEY, false);
      if(res && res.value){
        const parsed = JSON.parse(res.value);
        state.categories = parsed.categories || [];
        state.items = parsed.items || [];
        state.nextIdx = parsed.nextIdx || (state.categories.length+1);
        state.selectedCategoryId = state.categories.length ? state.categories[0].id : null;
      }
      storageNote.textContent = "";
    }catch(err){
      // no existing data yet
      storageNote.textContent = "";
    }
    render();
  }

  async function saveState(){
    try{
      await window.storage.set(STORAGE_KEY, JSON.stringify({
        categories: state.categories,
        items: state.items,
        nextIdx: state.nextIdx
      }), false);
    }catch(err){
      showToast("No se pudo guardar (revisa tu conexión)");
    }
  }

  // ---------- CATEGORY ACTIONS ----------
  function addCategory(name){
    name = name.trim();
    if(!name) return;
    const cat = { id: uid("cat"), name, idx: state.nextIdx++ };
    state.categories.push(cat);
    state.selectedCategoryId = cat.id;
    saveState();
    render();
  }

  function deleteCategory(id){
    const cat = state.categories.find(c=>c.id===id);
    if(!cat) return;
    const count = state.items.filter(i=>i.categoryId===id).length;
    const msg = count > 0
      ? `Eliminar "${cat.name}" y sus ${count} artículo(s)?`
      : `Eliminar la categoría "${cat.name}"?`;
    if(!confirm(msg)) return;
    state.categories = state.categories.filter(c=>c.id!==id);
    state.items = state.items.filter(i=>i.categoryId!==id);
    if(state.selectedCategoryId === id){
      state.selectedCategoryId = state.categories.length ? state.categories[0].id : null;
    }
    saveState();
    render();
  }

  function selectCategory(id){
    state.selectedCategoryId = id;
    editingItemId = null;
    render();
  }

  // ---------- ITEM ACTIONS ----------
  function upsertItem(data){
    if(editingItemId){
      const it = state.items.find(i=>i.id===editingItemId);
      if(it){
        it.code = data.code; it.name = data.name;
        it.qty = data.qty; it.price = data.price;
      }
      editingItemId = null;
    } else {
      state.items.push({
        id: uid("item"),
        categoryId: state.selectedCategoryId,
        code: data.code, name: data.name,
        qty: data.qty, price: data.price
      });
    }
    saveState();
    render();
  }

  function deleteItem(id){
    const it = state.items.find(i=>i.id===id);
    if(!it) return;
    if(!confirm(`Eliminar el artículo "${it.name}"?`)) return;
    state.items = state.items.filter(i=>i.id!==id);
    if(editingItemId === id) editingItemId = null;
    saveState();
    render();
  }

  function startEdit(id){
    editingItemId = id;
    render();
  }

  // ---------- EXCEL EXPORT ----------
  function sanitizeSheetName(name){
    return name.replace(/[\\/*?:\[\]]/g, "").slice(0,31) || "Hoja";
  }

  function exportExcel(){
    if(state.categories.length === 0){
      showToast("Agrega al menos una categoría primero");
      return;
    }
    const wb = XLSX.utils.book_new();
    const usedNames = new Set();

    // Resumen sheet
    const resumenRows = [["Categoría", "N° Artículos", "Cantidad Total", "Valor Total"]];
    state.categories.forEach(cat=>{
      const catItems = state.items.filter(i=>i.categoryId===cat.id);
      const totalQty = catItems.reduce((s,i)=> s + Number(i.qty||0), 0);
      const totalVal = catItems.reduce((s,i)=> s + Number(i.qty||0)*Number(i.price||0), 0);
      resumenRows.push([cat.name, catItems.length, totalQty, Number(totalVal.toFixed(2))]);
    });
    const grandItems = state.items.length;
    const grandQty = state.items.reduce((s,i)=> s + Number(i.qty||0), 0);
    const grandVal = state.items.reduce((s,i)=> s + Number(i.qty||0)*Number(i.price||0), 0);
    resumenRows.push([]);
    resumenRows.push(["TOTAL", grandItems, grandQty, Number(grandVal.toFixed(2))]);
    const wsResumen = XLSX.utils.aoa_to_sheet(resumenRows);
    wsResumen["!cols"] = [{wch:26},{wch:14},{wch:16},{wch:14}];
    XLSX.utils.book_append_sheet(wb, wsResumen, "Resumen");

    // One sheet per category
    state.categories.forEach(cat=>{
      const rows = [["Código", "Nombre", "Cantidad", "Precio Unitario", "Subtotal"]];
      const catItems = state.items.filter(i=>i.categoryId===cat.id);
      catItems.forEach(it=>{
        const subtotal = Number(it.qty||0)*Number(it.price||0);
        rows.push([it.code, it.name, Number(it.qty||0), Number(it.price||0), Number(subtotal.toFixed(2))]);
      });
      let sheetName = sanitizeSheetName(cat.name);
      let base = sheetName, n = 2;
      while(usedNames.has(sheetName)){ sheetName = (base.slice(0,28) + "_" + n); n++; }
      usedNames.add(sheetName);
      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws["!cols"] = [{wch:14},{wch:30},{wch:10},{wch:14},{wch:14}];
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
    });

    XLSX.writeFile(wb, "inventario.xlsx");
    showToast("Excel exportado ✓");
  }

  // ---------- RENDER ----------
  function render(){
    renderBins();
    renderPanel();
    renderStats();
  }

  function renderStats(){
    const totalItems = state.items.length;
    const totalValue = state.items.reduce((s,i)=> s + Number(i.qty||0)*Number(i.price||0), 0);
    $("#stat-total-items").textContent = totalItems + (totalItems===1 ? " artículo" : " artículos");
    $("#stat-total-value").textContent = "valor total: " + money(totalValue);
  }

  function renderBins(){
    binsEl.innerHTML = "";
    if(state.categories.length === 0){
      const p = document.createElement("p");
      p.style.cssText = "color:var(--ink-dim);font-size:13px;padding:6px 2px;";
      p.textContent = "Aún no hay categorías. Crea la primera abajo.";
      binsEl.appendChild(p);
      return;
    }
    state.categories.forEach((cat)=>{
      const count = state.items.filter(i=>i.categoryId===cat.id).length;
      const div = document.createElement("div");
      div.className = "bin" + (cat.id===state.selectedCategoryId ? " active" : "");
      div.innerHTML = `
        <span class="bin-idx">BIN-${String(cat.idx).padStart(3,"0")}</span>
        <div class="bin-name"></div>
        <div class="bin-count">${count} artículo${count===1?"":"s"}</div>
        <button class="bin-del" title="Eliminar categoría">✕</button>
      `;
      div.querySelector(".bin-name").textContent = cat.name;
      div.addEventListener("click", (e)=>{
        if(e.target.classList.contains("bin-del")) return;
        selectCategory(cat.id);
      });
      div.querySelector(".bin-del").addEventListener("click", (e)=>{
        e.stopPropagation();
        deleteCategory(cat.id);
      });
      binsEl.appendChild(div);
    });
  }

  function renderPanel(){
    const cat = state.categories.find(c=>c.id===state.selectedCategoryId);

    if(!cat){
      panelEl.innerHTML = `
        <div class="panel-head">
          <div><h2>Sin categoría seleccionada</h2><div class="sub">Crea o elige una categoría a la izquierda</div></div>
          <div class="toolbar"><button class="secondary" id="btn-export">Exportar a Excel</button></div>
        </div>
        <div class="empty"><b>No hay categoría activa.</b><br>Agrega una categoría para empezar a registrar artículos.</div>
      `;
      $("#btn-export").addEventListener("click", exportExcel);
      return;
    }

    const catItems = state.items.filter(i=>i.categoryId===cat.id);
    const totalQty = catItems.reduce((s,i)=> s + Number(i.qty||0), 0);
    const totalVal = catItems.reduce((s,i)=> s + Number(i.qty||0)*Number(i.price||0), 0);

    const editing = editingItemId ? state.items.find(i=>i.id===editingItemId) : null;

    panelEl.innerHTML = `
      <div class="panel-head">
        <div>
          <h2></h2>
          <div class="sub">BIN-${String(cat.idx).padStart(3,"0")} &middot; ${catItems.length} artículo${catItems.length===1?"":"s"}</div>
        </div>
        <div class="toolbar">
          <button class="secondary" id="btn-export">Exportar todo a Excel</button>
        </div>
      </div>

      <form class="item-form" id="form-item">
        <div>
          <label>Código</label>
          <input type="text" id="f-code" placeholder="SKU-001" required>
        </div>
        <div>
          <label>Nombre</label>
          <input type="text" id="f-name" placeholder="Nombre del artículo" required>
        </div>
        <div>
          <label>Cantidad</label>
          <input type="number" id="f-qty" min="0" step="1" placeholder="0" required>
        </div>
        <div>
          <label>Precio</label>
          <input type="number" id="f-price" min="0" step="0.01" placeholder="0.00" required>
        </div>
        <div style="display:flex;align-items:end;">
          <button type="submit" id="f-submit" style="width:100%;">${editing ? "Guardar" : "Agregar"}</button>
        </div>
        <div style="display:flex;align-items:end;">
          <button type="button" class="ghost" id="f-cancel" style="width:100%; ${editing? "" : "visibility:hidden;"}">Cancelar</button>
        </div>
      </form>

      ${catItems.length === 0 ? `
        <div class="empty"><b>Esta categoría no tiene artículos aún.</b><br>Usa el formulario de arriba para agregar el primero.</div>
      ` : `
      <table>
        <thead>
          <tr>
            <th>Código</th><th>Nombre</th><th class="num">Cantidad</th><th class="num">Precio</th><th class="num">Subtotal</th><th></th>
          </tr>
        </thead>
        <tbody id="items-tbody"></tbody>
        <tfoot>
          <tr>
            <td colspan="2">TOTAL CATEGORÍA</td>
            <td class="num" style="font-family:var(--mono);">${totalQty}</td>
            <td></td>
            <td class="total-val">${money(totalVal)}</td>
            <td></td>
          </tr>
        </tfoot>
      </table>
      `}
    `;
    panelEl.querySelector(".panel-head h2").textContent = cat.name;

    if(catItems.length){
      const tbody = $("#items-tbody");
      catItems.forEach(it=>{
        const subtotal = Number(it.qty||0)*Number(it.price||0);
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="code"></td>
          <td class="name"></td>
          <td class="num">${it.qty}</td>
          <td class="num">${money(it.price)}</td>
          <td class="num">${money(subtotal)}</td>
          <td class="actions">
            <button class="ghost btn-edit">Editar</button>
            <button class="ghost btn-del">Eliminar</button>
          </td>
        `;
        tr.querySelector(".code").textContent = it.code;
        tr.querySelector(".name").textContent = it.name;
        tr.querySelector(".btn-edit").addEventListener("click", ()=> startEdit(it.id));
        tr.querySelector(".btn-del").addEventListener("click", ()=> deleteItem(it.id));
        tbody.appendChild(tr);
      });
    }

    // form wiring
    const form = $("#form-item");
    if(editing){
      $("#f-code").value = editing.code;
      $("#f-name").value = editing.name;
      $("#f-qty").value = editing.qty;
      $("#f-price").value = editing.price;
      $("#f-cancel").addEventListener("click", ()=>{ editingItemId=null; render(); });
    }
    form.addEventListener("submit", (e)=>{
      e.preventDefault();
      const code = $("#f-code").value.trim();
      const name = $("#f-name").value.trim();
      const qty = parseFloat($("#f-qty").value);
      const price = parseFloat($("#f-price").value);
      if(!code || !name || isNaN(qty) || isNaN(price)) return;
      upsertItem({code, name, qty, price});
    });
    $("#btn-export").addEventListener("click", exportExcel);
  }

  // ---------- INIT ----------
  $("#form-add-bin").addEventListener("submit", (e)=>{
    e.preventDefault();
    const input = $("#input-new-bin");
    addCategory(input.value);
    input.value = "";
  });

  loadState();
})();
</script>
</body>
</html>
